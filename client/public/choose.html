<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Dashboard | TradeSphere</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a2e18;
            --accent: #00ff87;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            background-color: #0a2e18;
            /* Dynamic Deep Green Background */
            background-image: 
                radial-gradient(at 0% 0%, hsla(145,72%,39%,0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(168,84%,45%,0.4) 0px, transparent 50%);
            display: flex;
            flex-direction: column;
            color: white;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            padding: 25px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 46, 24, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
        }

        header h2 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -1px;
        }

        header h2 span { color: var(--accent); }

        .logout-btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--glass);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: white;
            color: var(--primary);
        }

        /* --- Main Layout --- */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .welcome-section {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease;
        }

        .welcome-section h1 {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .welcome-section p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 16px;
        }

        .dashboard-grid {
            display: flex;
            gap: 30px;
            max-width: 900px;
            width: 100%;
            justify-content: center;
            perspective: 1000px;
        }

        /* --- Role Cards --- */
        .card {
            flex: 1;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 50px 30px;
            text-align: center;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            animation: cardFade 1s ease forwards;
            opacity: 0;
        }

        .card:nth-child(1) { animation-delay: 0.2s; }
        .card:nth-child(2) { animation-delay: 0.4s; }

        @keyframes cardFade {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card:hover {
            transform: translateY(-15px) scale(1.02);
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--accent);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), 0 0 20px rgba(0, 255, 135, 0.1);
        }

        .role-icon {
            width: 80px;
            height: 80px;
            background: rgba(0, 255, 135, 0.1);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 25px;
            transition: 0.3s;
        }

        .card:hover .role-icon {
            background: var(--accent);
            transform: rotate(-10deg);
        }

        .card h3 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 15px;
        }

        .card p {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
            margin-bottom: 30px;
            min-height: 72px;
        }

        .enter-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: white;
            color: var(--primary);
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .card:hover .enter-btn {
            background: var(--accent);
            color: var(--primary);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- Responsive --- */
        @media(max-width: 768px) {
            .dashboard-grid { flex-direction: column; }
            .card { width: 100%; }
            header { padding: 20px 5%; }
        }
    </style>
</head>

<body>

<header>
    <h2>🌾 Trade<span>Sphere</span></h2>
    <button class="logout-btn" onclick="logout()">Logout</button>
</header>

<div class="container">
    <div class="welcome-section">
        <h1 id="userGreeting">Welcome back!</h1>
        <p>Please select your entry point to the marketplace</p>
    </div>

    <div class="dashboard-grid">
        
        <div class="card" onclick="goBuyer()">
            <div class="role-icon">🛒</div>
            <h3>Buyer Hub</h3>
            <p>Direct access to fresh harvests. Compare crop prices and secure deals with verified farmers.</p>
            <button class="enter-btn">Go to Marketplace</button>
        </div>

        <div class="card" onclick="goSeller()">
            <div class="role-icon">🌱</div>
            <h3>Seller Hub</h3>
            <p>Manage your agriculture business. List your crops, track inventory, and find global buyers.</p>
            <button class="enter-btn">Open My Shop</button>
        </div>

    </div>
</div>

<script>
    const username = localStorage.getItem("username");

    if(!username){
        window.location.href = "login.html";
    }

    // Set dynamic greeting
    document.getElementById("userGreeting").innerText = `Welcome, ${username}!`;

    function goBuyer(){
        window.location.href = "buyer.html";
    }

    function goSeller(){
        window.location.href = "seller.html";
    }

    function logout(){
        localStorage.removeItem("username");
        window.location.href = "login.html";
    }
</script>

</body>
</html>
