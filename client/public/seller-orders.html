<!DOCTYPE html>
<html>
<head>
<title>Sales History</title>
</head>
<body>

<h1>Sales History</h1>
<div id="sales"></div>

<script>

const seller = localStorage.getItem("username");

fetch(`http://localhost:5000/api/seller-orders/${seller}`)
.then(res => res.json())
.then(data => {

  const container = document.getElementById("sales");

  data.forEach(order => {
    container.innerHTML += `
      <div>
        <h3>${order.cropName}</h3>
        <p>Buyer: ${order.buyerName}</p>
        <p>Qty: ${order.quantity}</p>
        <p>Total: ₹${order.totalAmount}</p>
        <hr>
      </div>
    `;
  });

});

</script>

</body>
</html>
